<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Besteangebote</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>
</head>
<body class="bg-gray-100">

  <!-- Kopfbereich -->
  <header class="bg-orange-500 text-white p-4 flex items-center">
    <img src="logo.png" alt="Logo" class="h-10 mr-4"/>
    <h1 class="text-2xl font-bold">Besteangebote</h1>
  </header>

  <!-- Produktliste -->
  <main class="p-6">
    <h2 class="text-xl font-bold mb-4">Produkte</h2>
    <div id="productList" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
  </main>

  <!-- Admin Panel -->
  <section class="p-6 bg-white shadow mt-10">
    <h2 class="text-2xl font-bold mb-4">Admin-Bereich</h2>
    <div id="loginSection">
      <input type="password" id="adminPassword" placeholder="Passwort" class="border p-2 mr-2"/>
      <button onclick="login()" class="bg-orange-500 text-white px-4 py-2">Login</button>
    </div>
    <div id="adminSection" class="hidden">
      <h3 class="font-semibold mt-4">Kategorie hinzufügen</h3>
      <input id="categoryName" placeholder="Name" class="border p-2 mr-2"/>
      <input id="categoryEmoji" placeholder="Emoji" class="border p-2 mr-2"/>
      <button onclick="addCategory()" class="bg-green-500 text-white px-4 py-2">Hinzufügen</button>

      <h3 class="font-semibold mt-6">Produkt hinzufügen</h3>
      <input id="productName" placeholder="Produktname" class="border p-2 mr-2"/>
      <input id="amazonLink" placeholder="Amazon-Link" class="border p-2 mr-2"/>
      <input type="file" id="productImage" class="mr-2"/>
      <button onclick="addProduct()" class="bg-blue-500 text-white px-4 py-2">Hinzufügen</button>
    </div>
  </section>

  <script>
    // Firebase Konfiguration
    const firebaseConfig = {
      apiKey: "AIzaSyA4WrrmYvZqite0fKb_U02ok8g-aDMMbh4",
      authDomain: "besteangebote-5ac91.firebaseapp.com",
      projectId: "besteangebote-5ac91",
      storageBucket: "besteangebote-5ac91.appspot.com",
      messagingSenderId: "430767330617",
      appId: "1:430767330617:web:67335acba08209848704e8",
      measurementId: "G-FC8BGPS72D"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // Login
    function login() {
      const pw = document.getElementById("adminPassword").value;
      if (pw === "bestea2024") {
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("adminSection").classList.remove("hidden");
      } else {
        alert("Falsches Passwort!");
      }
    }

    // Kategorie hinzufügen
    async function addCategory() {
      const name = document.getElementById("categoryName").value;
      const emoji = document.getElementById("categoryEmoji").value;
      await db.collection("categories").add({ name, emoji });
      alert("Kategorie hinzugefügt!");
    }

    // Produkt hinzufügen
    async function addProduct() {
      const name = document.getElementById("productName").value;
      const amazonLink = document.getElementById("amazonLink").value;
      const file = document.getElementById("productImage").files[0];
      let imageUrl = "";

      if (file) {
        const storageRef = storage.ref("products/" + file.name);
        await storageRef.put(file);
        imageUrl = await storageRef.getDownloadURL();
      }

      await db.collection("products").add({ name, amazonLink, imageUrl });
      alert("Produkt hinzugefügt!");
      loadProducts();
    }

    // Produkte laden
    async function loadProducts() {
      const productList = document.getElementById("productList");
      productList.innerHTML = "";
      const snapshot = await db.collection("products").get();
      snapshot.forEach(doc => {
        const p = doc.data();
        const div = document.createElement("div");
        div.className = "border rounded-lg shadow p-4";
        div.innerHTML = `
          <img src="${p.imageUrl}" alt="${p.name}" class="w-full h-40 object-cover"/>
          <h3 class="font-bold mt-2">${p.name}</h3>
          <a href="${p.amazonLink}" target="_blank" class="text-blue-600">Auf Amazon ansehen</a>
        `;
        productList.appendChild(div);
      });
    }

    loadProducts();
  </script>
</body>
</html>
