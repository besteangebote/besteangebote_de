<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Beste Angebote</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { margin-top: 40px; }
    form input { margin: 5px; padding: 8px; }
    form button { padding: 8px 12px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 200px; text-align: center; }
    .product img { max-width: 100%; height: auto; }
  </style>
</head>
<body>

  <h1>Beste Angebote</h1>

  <!-- Admin Panel -->
  <h2>Admin Panel</h2>
  <form onsubmit="addProduct(); return false;">
    <input id="title" placeholder="Titulli">
    <input id="link" placeholder="Linku Amazon">
    <input id="image" placeholder="Linku i imazhit">
    <button type="submit">Shto produkt</button>
  </form>

  <!-- Produktet -->
  <h2>Produktet</h2>
  <div id="products"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

  <script>
    // Vendos këtu konfigurimin që merr nga Firebase Console
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA4WrrmYvZqite0fKb_U02ok8g-aDMMbh4",
  authDomain: "besteangebote-5ac91.firebaseapp.com",
  projectId: "besteangebote-5ac91",
  storageBucket: "besteangebote-5ac91.firebasestorage.app",
  messagingSenderId: "430767330617",
  appId: "1:430767330617:web:67335acba08209848704e8",
  measurementId: "G-FC8BGPS72D"
};

    // Inicializo Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Funksioni për shtimin e produkteve
    function addProduct() {
      const title = document.getElementById('title').value;
      const link = document.getElementById('link').value;
      const image = document.getElementById('image').value;

      db.ref('products').push({
        title: title,
        link: link,
        image: image
      });

      alert("Produkti u shtua!");
    }

    // Shfaqja e produkteve
    db.ref('products').on('value', snapshot => {
      const products = snapshot.val();
      const container = document.getElementById('products');
      container.innerHTML = '';
      for (let id in products) {
        const p = products[id];
        container.innerHTML += `
          <div class="product">
            <a href="${p.link}">
              <img src="${p.image}" alt="${p.title}">
            </a>
            <p>${p.title}</p>
          </div>
        `;
      }
    });
  </script>

</body>
</html>
