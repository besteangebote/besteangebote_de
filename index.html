<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>besteangebote</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
    header { background: #ff6600; color: white; padding: 15px; text-align: center; }
    header img { height: 50px; vertical-align: middle; }
    header h1 { display: inline; margin-left: 10px; font-size: 28px; }
    main { padding: 20px; }
    h2 { color: #333; }
    form input, form select { margin: 5px; padding: 8px; }
    form button { padding: 8px 12px; background: #ff6600; color: white; border: none; cursor: pointer; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; display: inline-block; width: 220px; text-align: center; background: white; }
    .product img { max-width: 100%; height: auto; }
    #adminPanel { display: none; margin-top: 20px; background: #fff3e6; padding: 15px; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <!-- Logo + Titel -->
  <header>
    <img src="LOGO_URL_HIER" alt="Logo"> <!-- Vendos URL-në e logos tënde -->
    <h1>besteangebote</h1>
  </header>

  <main>
    <!-- Login für Admin -->
    <h2>Admin Login</h2>
    <input type="password" id="adminCode" placeholder="Admin-Code eingeben">
    <button onclick="checkLogin()">Login</button>

    <!-- Admin Panel -->
    <div id="adminPanel">
      <h2>Admin Panel</h2>
      <form onsubmit="addProduct(); return false;">
        <input id="title" placeholder="Titel">
        <input id="link" placeholder="Amazon-Link">
        <input id="image" placeholder="Bild-URL">
        <select id="category">
          <option value="Tech">Tech</option>
          <option value="Küche">Küche</option>
          <option value="Haushalt">Haushalt</option>
          <option value="Sonstiges">Sonstiges</option>
        </select>
        <button type="submit">Produkt hinzufügen</button>
      </form>
    </div>

    <!-- Produkte -->
    <h2>Produkte</h2>
    <div id="products"></div>
  </main>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>

  <script>
    // Deine Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyA4WrrmYvZqite0fKb_U02ok8g-aDMMbh4",
      authDomain: "besteangebote-5ac91.firebaseapp.com",
      projectId: "besteangebote-5ac91",
      storageBucket: "besteangebote-5ac91.firebasestorage.app",
      messagingSenderId: "430767330617",
      appId: "1:430767330617:web:67335acba08209848704e8",
      measurementId: "G-FC8BGPS72D"
    };

    // Firebase initialisieren
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Admin Login
    function checkLogin() {
      const code = document.getElementById('adminCode').value;
      if (code === "bestea2024") {
        document.getElementById('adminPanel').style.display = "block";
        alert("Login erfolgreich!");
      } else {
        alert("Falscher Code!");
      }
    }

    // Produkt hinzufügen
    function addProduct() {
      const title = document.getElementById('title').value;
      const link = document.getElementById('link').value;
      const image = document.getElementById('image').value;
      const category = document.getElementById('category').value;

      db.ref('products').push({
        title: title,
        link: link,
        image: image,
        category: category
      });

      alert("Produkt wurde hinzugefügt!");
    }

    // Produkte anzeigen
    db.ref('products').on('value', snapshot => {
      const products = snapshot.val();
      const container = document.getElementById('products');
      container.innerHTML = '';
      for (let id in products) {
        const p = products[id];
        container.innerHTML += `
          <div class="product">
            <h3>${p.title}</h3>
            <p><strong>Kategorie:</strong> ${p.category}</p>
            <a href="${p.link}" target="_blank">
              <img src="${p.image}" alt="${p.title}">
            </a>
          </div>
        `;
      }
    });
  </script>

</body>
</html>
